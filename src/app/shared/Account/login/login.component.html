<section class="flex items-center justify-center p-6">
<div class="w-full max-w-2xl bg-transparent rounded-2xl p-2">

<!-- Language Icon -->
<div class="relative flex bottom-20 justify-end mb-4">

<button
(click)="toggleLangMenu()"
class="p-2 border border-light-gold rounded-lg hover:bg-gray-100 transition">

<i class="fa-solid fa-globe text-lg"></i>

</button>

<div
*ngIf="showLangMenu"
class="absolute right-0 mt-2 w-36 bg-white border rounded-lg shadow-lg z-50">

<button
(click)="changeLanguage('en')"
class="block w-full text-left px-4 py-2 hover:bg-gray-100">
English
</button>

<button
(click)="changeLanguage('ar')"
class="block w-full text-left px-4 py-2 hover:bg-gray-100">
عربي
</button>

<button
(click)="changeLanguage('fr')"
class="block w-full text-left px-4 py-2 hover:bg-gray-100">
Français
</button>

<button
(click)="changeLanguage('es')"
class="block w-full text-left px-4 py-2 hover:bg-gray-100">
Español
</button>

</div>
</div>

<!-- Title -->
<div class="text-center mb-8">
<h2 class="text-3xl font-bold text-dark-teal">
{{ "LOGIN.TITLE" | translate }}
</h2>
</div>

<form
[formGroup]="loginForm"
(ngSubmit)="onSubmit()"
class="grid grid-cols-1 gap-4">

<!-- Username or Email -->
<div>
<label class="block text-sm font-medium text-dark-gray">
{{ "LOGIN.USERNAME" | translate }}
</label>

<input
type="text"
formControlName="UserNameOrEmail"
class="w-full mt-1 p-3 border border-light-gold rounded-lg focus:ring-2 focus:ring-burnt-orange focus:outline-none"
/>

<div
*ngIf="submitted && f['UserNameOrEmail'].errors"
class="text-red-500 text-sm mt-1">

<p *ngIf="f['UserNameOrEmail'].errors['required']">
Username or Email is required
</p>

</div>
</div>

<!-- Password -->
<div>

<label class="block text-sm font-medium text-dark-gray">
{{ "LOGIN.PASSWORD" | translate }}
</label>

<input
type="password"
formControlName="Password"
class="w-full mt-1 p-3 border border-light-gold rounded-lg focus:ring-2 focus:ring-burnt-orange focus:outline-none"
/>

<div
*ngIf="submitted && f['Password'].errors"
class="text-red-500 text-sm mt-1">

<p *ngIf="f['Password'].errors['required']">
Password is required
</p>

</div>

</div>

<!-- Remember Me -->
<div class="flex items-center gap-2">

<input
type="checkbox"
formControlName="RememberMe"
class="w-4 h-4"
/>

<label class="text-sm text-dark-gray">
Remember Me
</label>

</div>

<!-- Submit -->
<button
type="submit"
class="w-full cursor-pointer bg-burnt-orange hover:bg-sand-brown text-white font-semibold py-3 rounded-lg transition duration-300">

{{ "LOGIN.LOGIN_BUTTON" | translate }}

</button>

</form>

<!-- Register Link -->
<p class="text-center text-dark-gray mt-6">

Don't have an account?

<a
routerLink="/register"
class="text-dark-teal font-semibold hover:text-burnt-orange transition">

Register

</a>

</p>

</div>
</section>
