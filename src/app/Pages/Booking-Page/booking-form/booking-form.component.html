<div class="p-6">

  <!-- Title -->
  <h2 class="text-2xl font-bold text-dark-gray mb-6">
    Complete Your Booking
  </h2>

  <!-- Trip Info -->
  <div
    class="bg-beige rounded-xl p-4 mb-6 flex gap-4 items-center"
  >

   <img
  [src]="item?.coverImage || item?.images?.[0]"
  class="w-28 h-28 rounded-xl object-cover"
/>

    <div>

      <h3 class="font-bold text-lg">
        {{ item?.title || item?.name }}
      </h3>

      <p class="text-gray-600 text-sm mt-1">
        {{ item?.description }}
      </p>

    </div>

  </div>

  <!-- Form -->
  <div class="space-y-4">

    <!-- Name -->
    <input
      type="text"
      [(ngModel)]="booking.customerName"
      placeholder="Full Name"
      class="w-full border rounded-xl px-4 py-3"
    />

    <!-- Phone -->
    <input
      type="text"
      [(ngModel)]="booking.phoneNumber"
      placeholder="Phone Number"
      class="w-full border rounded-xl px-4 py-3"
    />

    <!-- Email -->
    <input
      type="email"
      [(ngModel)]="booking.email"
      placeholder="Email Address"
      class="w-full border rounded-xl px-4 py-3"
    />

    <!-- People -->
    <input
      type="number"
      [(ngModel)]="booking.numberOfPeople"
      min="1"
      class="w-full border rounded-xl px-4 py-3"
    />

    <!-- Date -->
    <input
      type="date"
      [(ngModel)]="booking.startDate"
      class="w-full border rounded-xl px-4 py-3"
    />

  </div>

  <!-- Invoice -->
  <div
    class="mt-6 bg-light-gold rounded-xl p-5"
  >

    <h3 class="font-bold text-lg mb-4">
      Booking Summary
    </h3>

    <div class="space-y-2 text-dark-gray">

      <div class="flex justify-between">
        <span>Price Per Person</span>

        <span>
          {{
            item?.price ||
            item?.pricePerPerson
          }} EGP
        </span>
      </div>

      <div class="flex justify-between">
        <span>People</span>

        <span>
          {{ booking.numberOfPeople }}
        </span>
      </div>

      <div class="border-t pt-3 mt-3
                  flex justify-between font-bold text-lg">

        <span>Total</span>

        <span>
          {{ totalPrice }} EGP
        </span>

      </div>

    </div>

  </div>

  <!-- Buttons -->
  <div class="flex gap-4 mt-6">

    <button
      (click)="closeModal()"
      class="flex-1 border border-gray-300
             py-3 rounded-xl"
    >
      Cancel
    </button>

    <button
      (click)="confirmBooking()"
      class="flex-1 bg-burnt-orange hover:bg-dark-teal
             text-white py-3 rounded-xl font-semibold"
    >
      Confirm & WhatsApp
    </button>

  </div>

</div>
