<div
  class="bg-white rounded-3xl shadow-lg border border-creamy-gray p-6 flex flex-col text-center align-center justify-center lg:flex-row gap-5 items-center mt-4"
>
  <!-- 🔍 Search -->
  <!-- <div class="w-full lg:flex-1"></div> -->

  <!-- ⏳ Duration -->
  <div class="w-full lg:w-52">
    <label class="text-sm font-semibold text-dark-gray mb-2 block">
      Duration
    </label>

    <select
      [(ngModel)]="filters.durationInDays"
      class="w-full py-3 px-4 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-dark-teal bg-white cursor-pointer"
    >
      <option value="">All Durations</option>

      <option *ngFor="let item of durationOptions" [value]="item">
        {{ item }} Days
      </option>
    </select>
  </div>

  <!-- 💰 Price -->
  <div class="w-full lg:w-56">
    <label class="text-sm font-semibold text-dark-gray mb-2 block">
      Price Range
    </label>

    <select
      [(ngModel)]="filters.minPrice"
      class="w-full py-3 px-4 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-dark-teal bg-white cursor-pointer"
    >
      <option value="">All Prices</option>

      <option *ngFor="let item of priceOptions" [value]="item.min">
        {{ item.label }}
      </option>
    </select>
  </div>

  <!-- 🗺 Trips Count -->
  <div class="w-full lg:w-52">
    <label class="text-sm font-semibold text-dark-gray mb-2 block">
      Trips Count
    </label>

    <select
      [(ngModel)]="filters.tripsCount"
      class="w-full py-3 px-4 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-dark-teal bg-white cursor-pointer"
    >
      <option value="">All Trips</option>

      <option *ngFor="let item of tripsOptions" [value]="item">
        {{ item }} Trips
      </option>
    </select>
  </div>

  <!-- ⭐ Rating -->
  <div class="w-full lg:w-44">
    <label class="text-sm font-semibold text-dark-gray mb-2 block">
      Rating
    </label>

    <select
      [(ngModel)]="filters.rating"
      class="w-full py-3 px-4 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-dark-teal bg-white cursor-pointer"
    >
      <option value="">All Ratings</option>

      <option value="5">5 Stars</option>
      <option value="4">4+ Stars</option>
      <option value="3">3+ Stars</option>
    </select>
  </div>

  <!-- 🔘 Search Button -->
  <div class="w-full lg:w-auto flex items-end">
    <button
      (click)="applyFilters()"
      class="w-full lg:w-auto px-8 py-3 rounded-2xl bg-dark-teal text-white font-semibold hover:bg-burnt-orange transition-all duration-300 hover:scale-105 hover:shadow-xl flex items-center justify-center gap-2"
    >
      <i class="fas fa-search"></i>

      Search
    </button>
  </div>
</div>
